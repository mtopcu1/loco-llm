name: release-please

# Opens/updates the long-lived release PR (version + CHANGELOG), validates
# release branches with a fast build check, and publishes when a release PR
# merges. See docs/RELEASE_SETUP.md.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      prs_updated: ${{ steps.release.outputs.prs_updated }}
    steps:
      - uses: actions/checkout@v4
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-pr-check:
    needs: release-please
    if: |
      always() &&
      needs.release-please.result == 'success' && (
        needs.release-please.outputs.releases_created == 'true' ||
        needs.release-please.outputs.prs_created != '[]' ||
        needs.release-please.outputs.prs_updated != '[]'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.releases_created == 'true' && github.sha || 'release-please--branches--main--components--loco-llm-cli' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version fields stay in sync
        run: |
          python <<'PY'
          import json, re, sys
          from pathlib import Path
          root = Path(".")
          manifest = json.loads(root.joinpath(".release-please-manifest.json").read_text())["."]
          pyproject = re.search(
              r'^version = "([^"]+)"',
              root.joinpath("pyproject.toml").read_text(),
              re.MULTILINE,
          ).group(1)
          init = re.search(
              r'__version__ = "([^"]+)"',
              root.joinpath("src/llm_cli/__init__.py").read_text(),
          ).group(1)
          if manifest != pyproject or pyproject != init:
              print(
                  f"version mismatch: manifest={manifest} pyproject={pyproject} init={init}",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(f"version sync ok: {pyproject}")
          PY

      - name: Install build + twine
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: twine check
        run: twine check dist/*

  publish:
    needs: [release-please, release-pr-check]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release tag
        id: tag
        run: |
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Build scaffold tarball
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          tar czf "scaffold-${TAG}.tar.gz" \
            runtimes configs benchmarks requirements.yaml
          sha256sum "scaffold-${TAG}.tar.gz" > "scaffold-${TAG}.tar.gz.sha256"

      - name: Attach assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          gh release upload "${TAG}" \
            dist/*.whl \
            dist/*.tar.gz \
            "scaffold-${TAG}.tar.gz" \
            "scaffold-${TAG}.tar.gz.sha256" \
            --clobber
