name: release-please

# Opens/updates the long-lived release PR (version + CHANGELOG).
# Requires repo setting: Actions may create/approve pull requests.
# See docs/RELEASE_SETUP.md if this job fails at "create pull request".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
