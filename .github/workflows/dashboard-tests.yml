name: dashboard-tests
on:
  pull_request:
    paths:
      - 'dashboard/**'
      - 'src/llm_cli/webapi/**'
      - 'src/llm_cli/core/dashboard.py'
      - 'src/llm_cli/core/disk.py'
      - 'src/llm_cli/commands/dashboard_cmd.py'
      - 'pyproject.toml'
      - '.github/workflows/dashboard-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - run: uv venv && uv pip install -e ".[dev,dashboard]"
      - name: Run pytest
        env:
          CI: "true"
          NO_COLOR: "1"
          TERM: "dumb"
        run: uv run pytest -q --tb=short -n 4
      - run: cd dashboard && npm ci
      - run: cd dashboard && npm run typecheck
      - run: cd dashboard && npm run test
      - run: cd dashboard && npm run build
      - run: node dashboard/scripts/check-bundle-size.mjs
