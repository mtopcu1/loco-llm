name: ci
on:
  pull_request:
    branches: [main]
jobs:
  test:
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev,dashboard]"
      - name: Run pytest
        env:
          CI: "true"
          NO_COLOR: "1"
          TERM: "dumb"
        run: uv run pytest -q --tb=short -n auto
