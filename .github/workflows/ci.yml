name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    if: ${{ !startsWith(github.head_ref, 'release-please--') && (github.event_name != 'push' || !contains(github.event.head_commit.message, 'release-please--')) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]"
      - name: Run pytest
        env:
          CI: "true"
          NO_COLOR: "1"
          TERM: "dumb"
        run: pytest -q --tb=short

  build-check:
    if: ${{ !startsWith(github.head_ref, 'release-please--') && (github.event_name != 'push' || !contains(github.event.head_commit.message, 'release-please--')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build + twine
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: twine check
        run: twine check dist/*
