# Cross-cutting external prerequisites for the LocalLLM repo.
# Source of truth — `requirements.md` is auto-generated from this file.
#
# install_hint authoring:
#   - Prefer `pip install <pkg>` when PyPI ships the tool (e.g. cmake, huggingface_hub[cli]).
#   - Otherwise OS packages (apt/brew) or official URLs for drivers/toolkits.
#   - Multi-line hints: first line = quickest path; include official link when helpful.

- id: cuda-driver
  name: NVIDIA CUDA Driver (Windows host)
  why: GPU passthrough into WSL2
  verify:
    cmd: nvidia-smi
    version_regex: 'Driver Version:\s*([\d.]+)'
    min: "535.0"
  install_hint: |
    Install the NVIDIA GPU driver on Windows (WSL2 uses the host driver).
    https://www.nvidia.com/Download/index.aspx

- id: python
  name: Python
  why: Base interpreter for runtime venvs and the CLI
  verify:
    cmd: python3 --version
    version_regex: 'Python\s+([\d.]+)'
    min: "3.11"
  install_hint: |
    https://www.python.org/downloads/ (3.11+)
    Debian/Ubuntu: sudo apt install python3.11 python3.11-venv
    macOS: brew install python@3.11

- id: hf-cli
  name: huggingface-hub CLI
  why: Used by models/*/pull.sh to fetch weights
  verify:
    cmd: hf --version
    version_regex: '([\d.]+)'
    min: "0.20.0"
  install_hint: |
    pip install -U "huggingface_hub[cli]"
    https://huggingface.co/docs/huggingface_hub/en/guides/cli

- id: build-essential
  name: C/C++ toolchain (gcc, g++)
  why: Building llama.cpp and similar native runtimes
  verify:
    cmd: gcc --version
    version_regex: 'gcc.*?([\d.]+)'
    min: "11.0"
  install_hint: |
    Debian/Ubuntu: sudo apt install build-essential
    Fedora: sudo dnf groupinstall "Development Tools"
    macOS: xcode-select --install
    https://gcc.gnu.org/install/

- id: git
  name: Git
  why: Cloning runtime forks in runtimes/*/build.sh
  verify:
    cmd: git --version
    version_regex: 'git version\s+([\d.]+)'
    min: "2.30"
  install_hint: |
    https://git-scm.com/downloads
    Debian/Ubuntu: sudo apt install git
    macOS: brew install git

- id: curl
  name: curl
  why: healthcheck.sh and ad-hoc endpoint probing
  verify:
    cmd: curl --version
    version_regex: 'curl\s+([\d.]+)'
    min: "7.80"
  install_hint: |
    https://curl.se/download.html
    Debian/Ubuntu: sudo apt install curl
    macOS: brew install curl

- id: node
  name: Node.js
  scope: dashboard
  why: loco dashboard install / serve
  verify:
    cmd: node --version
    version_regex: 'v?([\d.]+)'
    min: "20.0.0"
  install_hint: |
    https://nodejs.org/ (LTS 20+)
    WSL/Linux: https://github.com/nvm-sh/nvm#installing-and-updating
    macOS: brew install node

- id: npm
  name: npm
  scope: dashboard
  why: loco dashboard install / serve
  verify:
    cmd: npm --version
    version_regex: '([\d.]+)'
    min: "10.0.0"
  install_hint: |
    Bundled with Node.js — install Node first (see node hint).
    https://docs.npmjs.com/downloading-and-installing-node-js-and-npm
