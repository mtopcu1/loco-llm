id: vllm
display_name: vLLM
kind: official
description: >
  Installs upstream vLLM in a dedicated virtual environment and serves
  safetensors model directories through the OpenAI-compatible API.

accepts_formats: [safetensors-dir]

build:
  vllm_version:
    type: string
    tier: common
    prompt: "vLLM version to install"
  pip_extra:
    type: enum
    values: [cuda, cpu, none]
    tier: common
    prompt: "PyTorch wheel channel (cuda/cpu/none)"
  extra_pip_packages:
    type: string
    tier: advanced
    prompt: "Additional pip packages (space-separated)"
  force_reinstall:
    type: bool
    tier: advanced
    prompt: "Force reinstall packages"
