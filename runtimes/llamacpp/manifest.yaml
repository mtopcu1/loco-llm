id: llamacpp
display_name: llama.cpp (llama-server)
kind: official
description: >
  Builds upstream llama.cpp and serves GGUF weights via the OpenAI-compatible
  HTTP API (`llama-server`).

accepts_formats: [gguf]

requires:
  - id: cmake
    verify:
      cmd: cmake --version
      version_regex: 'cmake version ([\d.]+)'
      min: "3.16"
    install_hint: "apt install cmake"
  - id: nvcc
    when: { build.flavor: cuda }
    verify:
      cmd: nvcc --version
      version_regex: 'release ([\d.]+)'
      min: "12.0"
    install_hint: "Install CUDA toolkit; see NVIDIA docs."

build:
  flavor:
    type: enum
    values: [cuda, cpu, vulkan]
    tier: common
    prompt: "Which backend to build?"
  jobs:
    type: int
    tier: common
    prompt: "Parallel build jobs (0 = nproc)"
  git_ref:
    type: string
    tier: common
    prompt: "Git tag, branch, or commit to build"
  cmake_build_type:
    type: enum
    values: [Release, RelWithDebInfo, Debug]
    tier: advanced
    prompt: "CMake build type"
  cublas:
    type: bool
    tier: advanced
    prompt: "Prefer cuBLAS matmul paths when using CUDA (disable for MMQ-only)"
  flash_attn:
    type: bool
    tier: advanced
    prompt: "Compile CUDA FlashAttention kernels (GGML_CUDA_FA)"
  native:
    type: bool
    tier: advanced
    prompt: "Optimize for the current CPU (-march=native style)"
  cuda_architectures:
    type: string
    tier: advanced
    prompt: "CMAKE_CUDA_ARCHITECTURES override (empty = CMake default), e.g. 86;89"
  static:
    type: bool
    tier: advanced
    prompt: "Static libraries (BUILD_SHARED_LIBS=OFF)"
  clean_build:
    type: bool
    tier: advanced
    prompt: "Delete the CMake build directory before configuring"

metrics:
  endpoint: /metrics
  format: prometheus
  fields:
    tps_decode:
      promql_metric: llamacpp:tokens_per_second_per_request
      label: "Decode TPS"
      unit: "tok/s"
    ttft_ms:
      promql_metric: llamacpp:time_to_first_token_seconds
      multiplier: 1000
      label: "TTFT"
      unit: "ms"
    kv_cache_pct:
      promql_metric: llamacpp:kv_cache_usage_ratio
      multiplier: 100
      label: "KV cache"
      unit: "%"
